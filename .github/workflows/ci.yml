name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Lint, API drift, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskbricks-fe

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: taskbricks-fe

      - name: Checkout backend OpenAPI source
        uses: actions/checkout@v4
        with:
          repository: KRISSBAJO/taskBrick_be
          path: taskbricks-be

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: taskbricks-fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated API client drift
        run: npm run api:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
